services:
  db:
    container_name: dino-db
    image: postgres:14
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-postgres}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-postgres}']
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    container_name: dino-server
    image: dino-server
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile.server
      args:
        SERVER_PORT: ${SERVER_PORT:-3001}
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      LOAD_DOTENV_FILE: '0'
      SERVER_PORT: ${SERVER_PORT:-3001}
      POSTGRES_HOST: db
      POSTGRES_PORT: '5432'
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-postgres}
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-postgres}
    ports:
      - '${SERVER_PORT:-3001}:${SERVER_PORT:-3001}'

  client:
    container_name: dino-client
    image: dino-client
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile.client
      args:
        CLIENT_PORT: ${CLIENT_PORT:-3000}
        SERVER_PORT: ${SERVER_PORT:-3001}
        EXTERNAL_SERVER_URL: ${EXTERNAL_SERVER_URL:-http://localhost:${SERVER_PORT:-3001}}
        INTERNAL_SERVER_URL: http://server:${SERVER_PORT:-3001}
    depends_on:
      server:
        condition: service_started
    environment:
      NODE_ENV: production
      LOAD_DOTENV_FILE: '0'
      PORT: ${CLIENT_PORT:-3000}
      EXTERNAL_SERVER_URL: ${EXTERNAL_SERVER_URL:-http://localhost:${SERVER_PORT:-3001}}
      INTERNAL_SERVER_URL: http://server:${SERVER_PORT:-3001}
    ports:
      - '${CLIENT_PORT:-3000}:${CLIENT_PORT:-3000}'

volumes:
  pgdata:
