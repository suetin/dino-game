name: Deploy

on:
  push:
    branches:
      - dev
      - main
  workflow_dispatch:
    inputs:
      ref:
        description: Branch to deploy
        required: false
        default: dev

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      DEPLOY_REF: ${{ github.event.inputs.ref || github.ref_name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure SSH access
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "${{ secrets.DEPLOY_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Debug SSH key
        run: |
          ssh-keygen -y -f ~/.ssh/id_ed25519
          ssh-keygen -lf ~/.ssh/id_ed25519

      - name: Debug SSH connection
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          echo "DEPLOY_USER=$DEPLOY_USER"
          echo "DEPLOY_HOST is set: $([ -n "$DEPLOY_HOST" ] && echo yes || echo no)"
          echo "DEPLOY_PORT=${DEPLOY_PORT:-22}"

          port="${DEPLOY_PORT:-22}"

          ssh -vvv \
            -i ~/.ssh/id_ed25519 \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=no \
            -p "$port" \
            "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "whoami"